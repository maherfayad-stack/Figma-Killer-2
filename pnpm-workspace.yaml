# canvas-code-studio monorepo workspace (§3 layout).
#
# `templates/*` are listed here only so the root install manages their node_modules
# too (dedup, one `pnpm install`) — they declare zero `workspace:*` deps on any
# studio package (playbook §4/P0 pitfall: templates must run standalone). The
# `pnpm create-file` script copies a template out to `files/<name>/` and runs an
# independent `pnpm install` there to prove that standalone claim.
packages:
  - 'apps/*'
  - 'packages/*'
  - 'templates/*'
  - 'e2e'

allowBuilds:
  esbuild: true

catalog:
  # pinned per .orchestrator/DECISIONS.md ADR-0001..0004 (verified npm latest, not memory)
  ts-morph: ^28.0.0
  vite: ^8.1.4

  # verified against registry.npmjs.org on 2026-07-13 (same discipline as ADR-0001..0004).
  # typescript: latest npm is 7.0.2, but typescript-eslint@8.63.0 declares
  # peerDependencies.typescript ">=4.8.4 <6.1.0" and crashes (not just warns)
  # against 7.x (`Cannot read properties of undefined (reading 'Cjs')` deep
  # in @typescript-eslint/typescript-estree's program cache). Verified by
  # actually running `pnpm lint`, not assumed. Pinning to the newest release
  # inside typescript-eslint's supported range instead — CHANGE-REQUEST:
  # revisit once typescript-eslint ships TS 7 support.
  typescript: ^6.0.3
  vitest: ^4.1.10
  eslint: ^10.7.0
  '@eslint/js': ^10.0.1
  typescript-eslint: ^8.63.0
  globals: ^17.7.0
  eslint-config-prettier: ^10.1.8
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-react-refresh: ^0.5.3
  prettier: ^3.9.5
  turbo: ^2.10.4
  '@playwright/test': ^1.61.1
  '@types/node': ^26.1.1
  zod: ^4.4.3
  react: ^19.2.7
  react-dom: ^19.2.7
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  '@vitejs/plugin-react': ^6.0.3
  tailwindcss: ^4.3.2
  '@tailwindcss/vite': ^4.3.2
  '@tailwindcss/postcss': ^4.3.2
  autoprefixer: ^10.5.2
  postcss: ^8.5.18
  chokidar: ^5.0.0
  ws: ^8.21.0
  '@types/ws': ^8.18.1
  simple-git: ^3.36.0

  # P1 canvas workstream (playbook §4/P1; ADR-0001 pins tldraw). Verified
  # against registry.npmjs.org on 2026-07-13 (same discipline as ADR-0001..0004,
  # not pinned from memory).
  tldraw: ^5.2.4
  html-to-image: ^1.11.13
  tsx: ^4.23.1

  # P2 WS-A (packages/vite-plugin-source-uid) — new direct dependencies, not
  # previously in this catalog. Deliberately NOT pinned to npm's bare
  # "latest" (Babel 8.0.x as of 2026-07-14) — pinned to 7.29.7 instead,
  # matching the version ALREADY resolved in pnpm-lock.yaml as a transitive
  # dependency of @vitejs/plugin-react's HMR-refresh transform. Taking the
  # fresh 8.x major here would fork the babel toolchain into two
  # incompatible major versions living side-by-side in node_modules (7.x via
  # plugin-react, 8.x via us) for no benefit. CHANGE-REQUEST flagged to the
  # orchestrator in the P2 WS-A worker report: this deviates from the
  # "always npm-view latest" ADR-0001..0004 discipline; rationale is
  # toolchain-coherence — please ratify or correct with an ADR.
  '@babel/core': ^7.29.7
  '@babel/traverse': ^7.29.7
  '@babel/parser': ^7.29.7
  '@babel/types': ^7.29.7
  # verified against registry.npmjs.org 2026-07-14: @babel/parser and
  # @babel/types ship their own bundled .d.ts at 7.29.7 (no @types/babel__*
  # package needed for those two — @types/babel__types 404s on npm, it's
  # been retired in favor of the bundled types); @babel/core/@babel/traverse
  # do not bundle types, hence the two @types/babel__* entries below.
  '@types/babel__core': ^7.20.5
  '@types/babel__traverse': ^7.28.0

  # P2 WS-A (packages/bridge) — jsdom for the postMessage/DOM bridge test
  # suite (task brief: "vitest + jsdom or happy-dom"). Verified against
  # registry.npmjs.org 2026-07-14, not memory.
  jsdom: ^29.1.1

  # P2 WS-B (packages/canvas) — zustand for the in-memory selection store
  # (editModeFrame/hoveredUid/selectedUids/breadcrumb; playbook §4/P2, One
  # Rule §5.1 — ephemeral UI state only, never persisted to disk). Verified
  # against registry.npmjs.org 2026-07-14, not memory. No separate
  # `@types/zustand` — the package ships its own bundled types.
  zustand: ^5.0.14

  # P3 WS-A (packages/ast-engine) — new direct dependency, not previously in
  # this catalog. CHANGE-REQUEST flagged in the P3 WS-A worker report:
  # ADR-0018's frozen `applyOp` signature returns `{newText, uidRemap}`
  # SYNCHRONOUSLY (no Promise — matches the P0 stub and
  # `golden-runner.test.ts`, which calls `applyOp(...)` without `await`).
  # prettier's public `format()` API is Promise-only as of v3 (verified
  # locally: `prettier.format(...)` returns a pending Promise even for the
  # built-in `typescript` parser — there is no more `format.sync`). `synckit`
  # is the standard fix for exactly this class of problem (it's what
  # `eslint-plugin-prettier` itself depends on to call prettier's async
  # `format()` synchronously from ESLint's sync rule API): a persistent
  # worker thread + `Atomics.wait`-based bridge, no fs/network IO of its
  # own. Verified against registry.npmjs.org 2026-07-14, not memory.
  synckit: ^0.11.13

minimumReleaseAgeExclude:
  - tsx@4.23.1
